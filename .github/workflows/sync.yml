name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        uses: huggingface/hub-sync@v1
        with:
          github_repo_id: AmanS112004/TMS
          huggingface_repo_id: astein11004/TMS
          hf_token: ${{ secrets.HF_TOKEN }}
