name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Check for HF_TOKEN
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "Error: HF_TOKEN secret is missing or empty!"
            exit 1
          fi
      - name: Push to hub
        uses: huggingface/hub-sync@main
        with:
          github_repo_id: AmanS112004/TMS
          huggingface_repo_id: astein11004/TMS
          hf_token: ${{ secrets.HF_TOKEN }}
